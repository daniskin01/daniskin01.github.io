<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Project — Daniel Aniskin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --ink: #0e0e0e;
  --paper: #f0ece4;
  --concrete: #c8c2b8;
  --accent: #b5401a;
  --nav-h: 56px;
  --toolbar-h: 52px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background:var(--paper);
  color:var(--ink);
  font-family:'DM Mono', monospace;
  cursor:none;
  overflow:hidden;
}

/* ── CURSOR ── */
#cursor {
  position:fixed; width:10px; height:10px;
  background:var(--accent); border-radius:50%;
  pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%);
  transition: width .15s, height .15s, background .15s;
}
#cursor.big { width:34px; height:34px; background:transparent; border:1.5px solid var(--accent); }

/* ── TOP NAV ── */
nav {
  position:fixed; top:0; left:0; right:0;
  height:var(--nav-h);
  display:flex; align-items:center;
  border-bottom:1px solid var(--ink);
  background:var(--paper);
  z-index:200;
  padding:0 40px;
  gap:20px;
}
.nav-back {
  display:flex; align-items:center; gap:10px;
  font-size:0.7rem; letter-spacing:0.16em;
  text-transform:uppercase; text-decoration:none;
  color:var(--ink); cursor:none;
  transition:color .2s;
}
.nav-back:hover { color:var(--accent); }
.nav-back .arr { font-size:1rem; transition:transform .2s; }
.nav-back:hover .arr { transform:translateX(-4px); }
.nav-divider { width:1px; height:20px; background:var(--concrete); }
#proj-title-nav {
  font-family:'Playfair Display', serif;
  font-size:0.9rem; font-style:italic;
  opacity:0.6; white-space:nowrap; overflow:hidden;
  text-overflow:ellipsis; max-width:300px;
}
.nav-right { margin-left:auto; display:flex; align-items:center; gap:6px; }

/* nav action buttons */
.nav-btn {
  display:flex; align-items:center; justify-content:center;
  width:36px; height:36px; cursor:none;
  border:1px solid var(--concrete);
  background:transparent;
  color:var(--ink); transition:all .2s;
  position:relative;
}
.nav-btn:hover { border-color:var(--ink); background:var(--ink); color:var(--paper); }
.nav-btn svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }
.nav-btn .tooltip {
  position:absolute; bottom:-32px; left:50%; transform:translateX(-50%);
  font-size:0.58rem; letter-spacing:0.1em; text-transform:uppercase;
  background:var(--ink); color:var(--paper);
  padding:3px 7px; white-space:nowrap;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.nav-btn:hover .tooltip { opacity:1; }

/* ── PDF TOOLBAR ── */
#toolbar {
  position:fixed;
  top:var(--nav-h); left:0; right:0;
  height:var(--toolbar-h);
  border-bottom:1px solid var(--concrete);
  background:var(--paper);
  z-index:190;
  display:flex; align-items:center;
  padding:0 40px; gap:0;
}

/* page controls */
.tb-group {
  display:flex; align-items:center; gap:0;
}
.tb-sep { width:1px; height:24px; background:var(--concrete); margin:0 16px; }
.tb-btn {
  width:36px; height:36px;
  display:flex; align-items:center; justify-content:center;
  cursor:none; border:none; background:transparent;
  color:var(--ink); transition:all .15s;
}
.tb-btn:hover { color:var(--accent); }
.tb-btn svg { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
.tb-btn:disabled { opacity:0.25; pointer-events:none; }

#page-display {
  font-size:0.7rem; letter-spacing:0.06em;
  display:flex; align-items:center; gap:6px;
}
#page-input {
  width:36px; height:28px;
  border:1px solid var(--concrete);
  background:transparent;
  font-family:'DM Mono', monospace;
  font-size:0.7rem; text-align:center;
  color:var(--ink); cursor:text;
  outline:none; transition:border-color .2s;
}
#page-input:focus { border-color:var(--ink); }
#page-total { opacity:0.4; }

/* zoom controls */
#zoom-display {
  font-size:0.7rem; letter-spacing:0.05em;
  min-width:42px; text-align:center;
}

/* page thumbnails strip */
#thumb-strip {
  position:fixed;
  top:calc(var(--nav-h) + var(--toolbar-h));
  left:0; bottom:0;
  width:110px;
  border-right:1px solid var(--concrete);
  background:var(--paper);
  overflow-y:auto; overflow-x:hidden;
  z-index:180;
  padding:12px 8px;
  display:flex; flex-direction:column; gap:8px;
  scrollbar-width:thin; scrollbar-color:var(--concrete) transparent;
}
#thumb-strip::-webkit-scrollbar { width:3px; }
#thumb-strip::-webkit-scrollbar-thumb { background:var(--concrete); }

.thumb-item {
  position:relative; cursor:none;
  border:1px solid var(--concrete);
  transition:border-color .2s, transform .2s;
  flex-shrink:0;
}
.thumb-item:hover { border-color:var(--ink); transform:scale(1.03); }
.thumb-item.active { border-color:var(--accent); }
.thumb-item canvas { display:block; width:100%; height:auto; }
.thumb-num {
  position:absolute; bottom:0; left:0; right:0;
  text-align:center; font-size:0.55rem;
  background:rgba(240,236,228,0.85); padding:2px 0;
  letter-spacing:0.08em; opacity:0.6;
}

/* ── MAIN CANVAS AREA ── */
#viewer {
  position:fixed;
  top:calc(var(--nav-h) + var(--toolbar-h));
  left:110px; right:0; bottom:0;
  overflow:auto;
  background:#e8e3db;
  display:flex; justify-content:center;
  align-items:flex-start;
  padding:32px;
  scrollbar-width:thin; scrollbar-color:var(--concrete) transparent;
}
#viewer::-webkit-scrollbar { width:5px; height:5px; }
#viewer::-webkit-scrollbar-thumb { background:var(--concrete); }

#canvas-wrapper {
  position:relative;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.08);
  line-height:0;
}
#pdf-canvas {
  display:block;
}

/* ── LOADING / EMPTY STATE ── */
#drop-zone {
  position:fixed;
  top:calc(var(--nav-h) + var(--toolbar-h));
  left:110px; right:0; bottom:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:20px;
  z-index:50;
}
#drop-zone.hidden { display:none; }
.dz-icon {
  width:64px; height:64px; opacity:0.2;
}
.dz-icon svg { width:100%; height:100%; stroke:var(--ink); fill:none; stroke-width:1; stroke-linecap:round; stroke-linejoin:round; }
.dz-label {
  font-family:'Playfair Display', serif;
  font-size:1.4rem; font-style:italic; opacity:0.3;
}
.dz-sub { font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; opacity:0.2; }
.dz-upload-btn {
  margin-top:10px;
  display:inline-flex; align-items:center; gap:10px;
  font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase;
  border:1px solid var(--ink); padding:10px 22px;
  cursor:none; background:transparent; color:var(--ink);
  transition:all .2s;
}
.dz-upload-btn:hover { background:var(--ink); color:var(--paper); }

#loader {
  position:fixed;
  top:calc(var(--nav-h) + var(--toolbar-h));
  left:110px; right:0; bottom:0;
  display:flex; align-items:center; justify-content:center;
  z-index:60; background:rgba(240,236,228,0.7);
}
#loader.hidden { display:none; }
.loader-ring {
  width:36px; height:36px;
  border:2px solid var(--concrete);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── FULLSCREEN OVERLAY ── */
#fs-overlay {
  display:none;
  position:fixed; inset:0;
  background:#000;
  z-index:500;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
#fs-overlay.active { display:flex; }
#fs-canvas-wrapper {
  position:relative;
  max-width:96vw; max-height:90vh;
  line-height:0;
}
#fs-canvas {
  display:block;
  max-width:96vw; max-height:90vh;
  object-fit:contain;
}
#fs-close {
  position:absolute; top:16px; right:20px;
  font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase;
  color:#fff; cursor:none; display:flex; align-items:center; gap:8px;
  opacity:0.6; transition:opacity .2s;
}
#fs-close:hover { opacity:1; }
#fs-nav {
  display:flex; gap:20px; margin-top:16px; align-items:center;
}
.fs-nav-btn {
  width:40px; height:40px; border:1px solid rgba(255,255,255,0.25);
  background:transparent; color:#fff; cursor:none;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s;
}
.fs-nav-btn:hover { border-color:#fff; }
.fs-nav-btn svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
.fs-nav-btn:disabled { opacity:0.2; pointer-events:none; }
#fs-page-info { color:rgba(255,255,255,0.5); font-size:0.7rem; letter-spacing:0.1em; min-width:80px; text-align:center; }

/* ── SHARE TOAST ── */
#toast {
  position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--ink); color:var(--paper);
  font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase;
  padding:10px 22px; z-index:600;
  opacity:0; transition:all .3s;
  pointer-events:none;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── FILE INPUT ── */
#file-input { display:none; }
</style>
</head>
<body>

<div id="cursor"></div>
<input type="file" id="file-input" accept=".pdf">

<!-- NAV -->
<nav>
  <a class="nav-back" href="index.html"><span class="arr">←</span> Back</a>
  <div class="nav-divider"></div>
  <div id="proj-title-nav">No project loaded</div>
  <div class="nav-right">
    <!-- Download -->
    <button class="nav-btn" id="btn-download" title="Download" disabled>
      <svg viewBox="0 0 24 24"><path d="M12 3v13M7 11l5 5 5-5"/><path d="M3 20h18"/></svg>
      <span class="tooltip">Download</span>
    </button>
    <!-- Share -->
    <button class="nav-btn" id="btn-share" title="Share" disabled>
      <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="2"/><circle cx="6" cy="12" r="2"/><circle cx="18" cy="19" r="2"/><path d="M8 11.5l8-5M8 12.5l8 5"/></svg>
      <span class="tooltip">Share link</span>
    </button>
    <!-- Fullscreen -->
    <button class="nav-btn" id="btn-fs" title="Fullscreen" disabled>
      <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 00-2 2v3M16 3h3a2 2 0 012 2v3M21 16v3a2 2 0 01-2 2h-3M3 16v3a2 2 0 002 2h3"/></svg>
      <span class="tooltip">Fullscreen</span>
    </button>
    <!-- Load PDF -->
    <button class="nav-btn" id="btn-load" title="Open PDF">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="tooltip">Open PDF</span>
    </button>
  </div>
</nav>

<!-- TOOLBAR -->
<div id="toolbar">
  <!-- Prev page -->
  <div class="tb-group">
    <button class="tb-btn" id="btn-prev" disabled>
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div id="page-display">
      <input type="number" id="page-input" value="1" min="1">
      <span style="opacity:0.3;">/</span>
      <span id="page-total">—</span>
    </div>
    <button class="tb-btn" id="btn-next" disabled>
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <div class="tb-sep"></div>

  <!-- Zoom -->
  <div class="tb-group">
    <button class="tb-btn" id="btn-zoom-out" disabled>
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <span id="zoom-display">100%</span>
    <button class="tb-btn" id="btn-zoom-in" disabled>
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <button class="tb-btn" id="btn-zoom-fit" disabled title="Fit to width">
      <svg viewBox="0 0 24 24"><path d="M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4"/></svg>
    </button>
    <button class="tb-btn" id="btn-zoom-reset" disabled title="Reset zoom">
      <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 101.5-5"/><path d="M3 3v5h5"/></svg>
    </button>
  </div>
</div>

<!-- THUMBNAIL STRIP -->
<div id="thumb-strip"></div>

<!-- CANVAS VIEWER -->
<div id="viewer">
  <div id="canvas-wrapper">
    <canvas id="pdf-canvas"></canvas>
  </div>
</div>

<!-- DROP / EMPTY STATE -->
<div id="drop-zone">
  <div class="dz-icon">
    <svg viewBox="0 0 64 64"><rect x="8" y="4" width="40" height="52" rx="3"/><path d="M36 4v14h12M20 28h24M20 36h20M20 44h16"/></svg>
  </div>
  <div class="dz-label">No PDF loaded</div>
  <div class="dz-sub">Open a project PDF to view it here</div>
  <button class="dz-upload-btn" id="btn-load-dz">
    <svg style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.6" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    Open PDF
  </button>
</div>

<!-- LOADER -->
<div id="loader" class="hidden"><div class="loader-ring"></div></div>

<!-- FULLSCREEN OVERLAY -->
<div id="fs-overlay">
  <div id="fs-close" id="btn-fs-close">
    <svg style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.6" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    Close
  </div>
  <div id="fs-canvas-wrapper">
    <canvas id="fs-canvas"></canvas>
  </div>
  <div id="fs-nav">
    <button class="fs-nav-btn" id="fs-prev" disabled>
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span id="fs-page-info">1 / 1</span>
    <button class="fs-nav-btn" id="fs-next" disabled>
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

<!-- SHARE TOAST -->
<div id="toast">Link copied to clipboard</div>

<script>
// ── PDF.js setup ──
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null;
let currentPage = 1;
let scale = 1.0;
let pdfBytes = null;
let pdfName = '';
const ZOOM_STEP = 0.15;
const ZOOM_MIN = 0.4;
const ZOOM_MAX = 4.0;

// DOM refs
const canvas       = document.getElementById('pdf-canvas');
const ctx          = canvas.getContext('2d');
const fsCanvas     = document.getElementById('fs-canvas');
const fsCtx        = fsCanvas.getContext('2d');
const viewer       = document.getElementById('viewer');
const thumbStrip   = document.getElementById('thumb-strip');
const dropZone     = document.getElementById('drop-zone');
const loader       = document.getElementById('loader');
const fsOverlay    = document.getElementById('fs-overlay');
const toast        = document.getElementById('toast');
const projTitleNav = document.getElementById('proj-title-nav');
const pageInput    = document.getElementById('page-input');
const pageTotal    = document.getElementById('page-total');
const zoomDisplay  = document.getElementById('zoom-display');

// ── Read URL param for project id (future: auto-load matching PDF) ──
const params = new URLSearchParams(location.search);
const projId = params.get('id') || '';
if (projId) {
  const name = projId.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  projTitleNav.textContent = name;
  document.title = name + ' — Daniel Aniskin';
}

// ── Load PDF from file ──
async function loadPDF(file) {
  pdfName = file.name;
  projTitleNav.textContent = file.name.replace('.pdf','');
  document.title = projTitleNav.textContent + ' — Daniel Aniskin';

  dropZone.classList.add('hidden');
  loader.classList.remove('hidden');

  const arrayBuffer = await file.arrayBuffer();
  pdfBytes = new Uint8Array(arrayBuffer);

  pdfDoc = await pdfjsLib.getDocument({ data: pdfBytes }).promise;

  loader.classList.add('hidden');
  enableControls();
  currentPage = 1;
  pageTotal.textContent = pdfDoc.numPages;
  pageInput.max = pdfDoc.numPages;
  scale = await fitScale();

  await renderPage(currentPage);
  buildThumbs();
}

// Compute scale to fit viewer width
async function fitScale() {
  const page = await pdfDoc.getPage(1);
  const vp = page.getViewport({ scale:1 });
  const availW = viewer.clientWidth - 64;
  return Math.max(0.4, availW / vp.width);
}

// ── Render main canvas ──
async function renderPage(num) {
  const page = await pdfDoc.getPage(num);
  const vp = page.getViewport({ scale });
  canvas.width  = vp.width;
  canvas.height = vp.height;
  await page.render({ canvasContext:ctx, viewport:vp }).promise;
  currentPage = num;
  pageInput.value = num;
  updateNavBtns();
  highlightThumb(num);
  // sync fullscreen if open
  if (fsOverlay.classList.contains('active')) renderFS(num);
}

// ── Render fullscreen canvas ──
async function renderFS(num) {
  const page = await pdfDoc.getPage(num);
  const vp1 = page.getViewport({ scale:1 });
  const scaleFS = Math.min((window.innerWidth*0.96)/vp1.width, (window.innerHeight*0.88)/vp1.height);
  const vp = page.getViewport({ scale:scaleFS });
  fsCanvas.width  = vp.width;
  fsCanvas.height = vp.height;
  await page.render({ canvasContext:fsCtx, viewport:vp }).promise;
  document.getElementById('fs-page-info').textContent = `${num} / ${pdfDoc.numPages}`;
  document.getElementById('fs-prev').disabled = num <= 1;
  document.getElementById('fs-next').disabled = num >= pdfDoc.numPages;
}

// ── Build thumbnail strip ──
async function buildThumbs() {
  thumbStrip.innerHTML = '';
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    const item = document.createElement('div');
    item.className = 'thumb-item' + (i === 1 ? ' active' : '');
    item.dataset.page = i;

    const tc = document.createElement('canvas');
    const tn = document.createElement('div');
    tn.className = 'thumb-num';
    tn.textContent = i;

    item.appendChild(tc);
    item.appendChild(tn);
    thumbStrip.appendChild(item);

    item.addEventListener('click', () => {
      currentPage = i;
      renderPage(i);
    });

    // render thumb async
    (async () => {
      const page = await pdfDoc.getPage(i);
      const vp = page.getViewport({ scale: 0.18 });
      tc.width  = vp.width;
      tc.height = vp.height;
      await page.render({ canvasContext:tc.getContext('2d'), viewport:vp }).promise;
    })();
  }
}

function highlightThumb(num) {
  thumbStrip.querySelectorAll('.thumb-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.page) === num);
  });
  const active = thumbStrip.querySelector('.thumb-item.active');
  if (active) active.scrollIntoView({ block:'nearest', behavior:'smooth' });
}

// ── Controls ──
function enableControls() {
  ['btn-prev','btn-next','btn-zoom-in','btn-zoom-out','btn-zoom-fit',
   'btn-zoom-reset','btn-download','btn-share','btn-fs'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = false;
  });
}

function updateNavBtns() {
  document.getElementById('btn-prev').disabled = currentPage <= 1;
  document.getElementById('btn-next').disabled = currentPage >= (pdfDoc ? pdfDoc.numPages : 1);
  zoomDisplay.textContent = Math.round(scale * 100) + '%';
}

// ── Zoom helpers ──
function zoomIn()    { scale = Math.min(ZOOM_MAX, scale + ZOOM_STEP); renderPage(currentPage); }
function zoomOut()   { scale = Math.max(ZOOM_MIN, scale - ZOOM_STEP); renderPage(currentPage); }
async function zoomFit()   { scale = await fitScale(); renderPage(currentPage); }
function zoomReset() { scale = 1.0; renderPage(currentPage); }

// ── Button wiring ──
document.getElementById('btn-prev').addEventListener('click',  () => { if(currentPage>1) renderPage(currentPage-1); });
document.getElementById('btn-next').addEventListener('click',  () => { if(pdfDoc && currentPage<pdfDoc.numPages) renderPage(currentPage+1); });
document.getElementById('btn-zoom-in').addEventListener('click',  zoomIn);
document.getElementById('btn-zoom-out').addEventListener('click', zoomOut);
document.getElementById('btn-zoom-fit').addEventListener('click', zoomFit);
document.getElementById('btn-zoom-reset').addEventListener('click', zoomReset);

pageInput.addEventListener('change', () => {
  const n = Math.max(1, Math.min(pdfDoc.numPages, parseInt(pageInput.value)||1));
  renderPage(n);
});

// ── File open ──
const fileInput = document.getElementById('file-input');
document.getElementById('btn-load').addEventListener('click', () => fileInput.click());
document.getElementById('btn-load-dz').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadPDF(e.target.files[0]);
});

// Drag & drop on viewer
document.body.addEventListener('dragover', e => { e.preventDefault(); });
document.body.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') loadPDF(f);
});

// ── Download ──
document.getElementById('btn-download').addEventListener('click', () => {
  if (!pdfBytes) return;
  const blob = new Blob([pdfBytes], { type:'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = pdfName || 'project.pdf';
  a.click(); URL.revokeObjectURL(url);
});

// ── Share ──
document.getElementById('btn-share').addEventListener('click', () => {
  const url = location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(showToast);
  } else {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); showToast();
  }
});

function showToast() {
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

// ── Fullscreen ──
document.getElementById('btn-fs').addEventListener('click', openFS);
document.getElementById('fs-overlay').addEventListener('click', e => {
  if (e.target === fsOverlay || e.target.closest('#fs-close')) closeFS();
});
document.getElementById('fs-close').addEventListener('click', closeFS);
document.getElementById('fs-prev').addEventListener('click', e => { e.stopPropagation(); if(currentPage>1){ currentPage--; renderPage(currentPage); renderFS(currentPage); }});
document.getElementById('fs-next').addEventListener('click', e => { e.stopPropagation(); if(pdfDoc && currentPage<pdfDoc.numPages){ currentPage++; renderPage(currentPage); renderFS(currentPage); }});

function openFS() {
  if (!pdfDoc) return;
  fsOverlay.classList.add('active');
  renderFS(currentPage);
}
function closeFS() { fsOverlay.classList.remove('active'); }

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (!pdfDoc) return;
  const inInput = document.activeElement === pageInput;
  if (e.key === 'ArrowRight' || (!inInput && e.key === 'ArrowDown')) { if(currentPage<pdfDoc.numPages) renderPage(currentPage+1); }
  if (e.key === 'ArrowLeft'  || (!inInput && e.key === 'ArrowUp'))   { if(currentPage>1) renderPage(currentPage-1); }
  if (e.key === '+' || e.key === '=') zoomIn();
  if (e.key === '-') zoomOut();
  if (e.key === '0') zoomReset();
  if (e.key === 'f' || e.key === 'F') { if (fsOverlay.classList.contains('active')) closeFS(); else openFS(); }
  if (e.key === 'Escape') closeFS();
});

// Scroll to zoom (Ctrl+wheel)
viewer.addEventListener('wheel', e => {
  if (!pdfDoc || !e.ctrlKey) return;
  e.preventDefault();
  if (e.deltaY < 0) zoomIn(); else zoomOut();
}, { passive:false });

// ── Cursor ──
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});
document.addEventListener('mouseover', e => {
  cursor.classList.toggle('big', !!e.target.closest('a, button, .thumb-item, .dz-upload-btn'));
});
</script>
</body>
</html>
