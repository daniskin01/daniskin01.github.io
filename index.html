<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Projects</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* Smooth scrolling handled by CSS */
html{
    scroll-behavior:smooth;
}

/* allow ONLY horizontal scroll */
body{
    overflow-x:auto;
    overflow-y:hidden;
}

/* horizontal container */
.wrapper{
    display:flex;
    height:100vh;

    scroll-snap-type:x proximity; /* softer, smoother snap */
}

/* each project = full screen */
section{
    flex:0 0 100vw;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:40px;

    scroll-snap-align:start;
}

/* images */
section img{
    width:80%;
    height:60%;
    object-fit:cover;
    margin:20px 0;
    border-radius:12px;
}

/* titles */
h1{
    font-size:3rem;
}

/* demo colors */
#project1{ background:#f3f3f3; }
#project2{ background:#e6e6e6; }
#project3{ background:#dadada; }

/* back button */
.back{
    position:fixed;
    top:20px;
    left:20px;
    background:black;
    color:white;
    padding:10px 15px;
    text-decoration:none;
    z-index:10;
}
</style>
</head>

<body>

<a href="index.html" class="back">← Back</a>

<div class="wrapper">

<section id="project1">
    <h1>Project 1</h1>
    <img src="https://picsum.photos/1400/900?1">
</section>

<section id="project2">
    <h1>Project 2</h1>
    <img src="https://picsum.photos/1400/900?2">
</section>

<section id="project3">
    <h1>Project 3</h1>
    <img src="https://picsum.photos/1400/900?3">
</section>

</div>

<script>
/* convert vertical wheel → horizontal (no animation here!) */
window.addEventListener("wheel", function(e){
    e.preventDefault();
    window.scrollLeft += e.deltaY;
}, { passive:false });
</script>

</body>
</html>
