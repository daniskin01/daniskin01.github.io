<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Projects</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* IMPORTANT FIX */
body{
    overflow-x:auto;   /* allow horizontal */
    overflow-y:hidden; /* block vertical only */
}

/* container */
.wrapper{
    display:flex;
    height:100vh;
    width:300vw; /* 3 sections = 300vw */
    scroll-snap-type:x mandatory;
    scroll-behavior:smooth;
}

/* each section */
section{
    width:100vw;
    height:100vh;

    flex-shrink:0;
    scroll-snap-align:start;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:40px;
}

/* images */
img{
    width:75%;
    height:60%;
    object-fit:cover;
    margin:20px 0;
}

/* demo colors */
#project1{ background:#f2f2f2; }
#project2{ background:#e5e5e5; }
#project3{ background:#d9d9d9; }

.back{
    position:fixed;
    top:20px;
    left:20px;
    background:black;
    color:white;
    padding:10px 15px;
    text-decoration:none;
}
</style>
</head>

<body>

<a href="index.html" class="back">← Back</a>

<div class="wrapper">

<section id="project1">
    <h1>Project 1</h1>
    <img src="https://picsum.photos/1400/900?1">
</section>

<section id="project2">
    <h1>Project 2</h1>
    <img src="https://picsum.photos/1400/900?2">
</section>

<section id="project3">
    <h1>Project 3</h1>
    <img src="https://picsum.photos/1400/900?3">
</section>

</div>

<script>
/* convert vertical mouse wheel → horizontal scroll */
window.addEventListener("wheel", (e) => {
    window.scrollBy({
        left: e.deltaY * 2,
        behavior: "smooth"
    });
});
</script>

</body>
</html>
