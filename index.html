<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    overflow:hidden;
}

/* ===== WRAPPER ===== */
.wrapper{
    display:flex;
    height:100vh;
    width:100vw;
    transition:transform 0.7s ease;
}

/* ===== SECTIONS ===== */
section{
    min-width:100vw;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:40px;
}

/* ===== TITLE PAGE STYLE ===== */
.title-page{
    background:#111;
    color:white;
    text-align:center;
}

.title-page h1{
    font-size:4rem;
    letter-spacing:2px;
    margin-bottom:20px;
}

.title-page h2{
    font-weight:300;
    opacity:0.8;
}

.title-page p{
    margin-top:20px;
    max-width:600px;
    opacity:0.7;
}

/* ===== PROJECT SECTIONS ===== */
section img{
    width:75%;
    height:60%;
    object-fit:cover;
    margin:20px 0;
    border-radius:12px;
}

h1{
    font-size:3rem;
}

/* demo colors */
#p1{ background:#f3f3f3; }
#p2{ background:#e6e6e6; }
#p3{ background:#dadada; }

/* ===== DOTS ===== */
.dots{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:12px;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:#999;
    cursor:pointer;
    transition:.3s;
}

.dot.active{
    background:#000;
    transform:scale(1.4);
}

/* back button */
.back{
    position:fixed;
    top:20px;
    left:20px;
    background:black;
    color:white;
    padding:10px 15px;
    text-decoration:none;
    z-index:10;
}
</style>
</head>

<body>

<div class="wrapper" id="wrapper">

<!-- ===== TITLE PAGE (NEW) ===== -->
<section class="title-page">
    <h1>DANIEL ANISKIN</h1>
    <h2>Architecture Technology Student</h2>
    <p>
        Portfolio of selected academic and professional projects.
        Design focused on comfort, sustainability, and human experience.
    </p>
    <p style="margin-top:40px; opacity:.5;">Scroll →</p>

    <img src="immanin">
    
</section>


<!-- ===== PROJECTS ===== -->
<section id="p1">
    <h1>Residential House</h1>
    <img src="p1">
</section>

<section id="p2">
    <h1>Community Center</h1>
    <img src="https://picsum.photos/1400/900?2">
</section>

<section id="p3">
    <h1>Urban Plaza</h1>
    <img src="https://picsum.photos/1400/900?3">
</section>

</div>


<!-- DOTS -->
<div class="dots" id="dots"></div>


<script>
const wrapper = document.getElementById("wrapper");
const sections = document.querySelectorAll("section");
const dotsContainer = document.getElementById("dots");

let index = 0;
let locked = false;

/* create dots automatically */
sections.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "dot";
    if(i === 0) d.classList.add("active");
    d.onclick = () => goTo(i);
    dotsContainer.appendChild(d);
});

const dots = document.querySelectorAll(".dot");

function goTo(i){
    index = Math.max(0, Math.min(i, sections.length-1));
    wrapper.style.transform = `translateX(-${index * 100}vw)`;

    dots.forEach(d => d.classList.remove("active"));
    dots[index].classList.add("active");
}

/* wheel scroll */
window.addEventListener("wheel", e => {
    if(locked) return;

    locked = true;

    if(e.deltaY > 0) index++;
    else index--;

    goTo(index);

    setTimeout(() => locked = false, 700);
});

/* keyboard arrows */
window.addEventListener("keydown", e => {
    if(e.key === "ArrowRight") goTo(index+1);
    if(e.key === "ArrowLeft") goTo(index-1);
});
</script>

</body>
</html>
