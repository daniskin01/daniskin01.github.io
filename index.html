<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Projects</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    overflow:hidden; /* we control movement manually */
}

/* ===== HORIZONTAL WRAPPER ===== */
.wrapper{
    display:flex;
    height:100vh;
    width:100vw;
    transition:transform 0.7s ease; /* smooth slide animation */
}

/* ===== SECTIONS ===== */
section{
    min-width:100vw;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:40px;
}

section img{
    width:75%;
    height:60%;
    object-fit:cover;
    margin:20px 0;
    border-radius:12px;
}

sectionMain{
    min-width:100vw;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:40px;
}
    
section imgMain{
    width:40%;
    height:40%;
    object-fit:cover;
    margin:20px 0;
    border-radius:12px;
}

h1{
    font-size:3rem;
}

/* demo backgrounds */
#project1{ background:#f3f3f3; }
#project2{ background:#e6e6e6; }
#project3{ background:#dadada; }

/* ===== BACK BUTTON ===== */
.back{
    position:fixed;
    top:20px;
    left:20px;
    background:black;
    color:white;
    padding:10px 15px;
    text-decoration:none;
    z-index:10;
}

/* ===== DOTS NAVIGATION ===== */
.dots{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:12px;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:#999;
    cursor:pointer;
    transition:.3s;
}

.dot.active{
    background:#000;
    transform:scale(1.4);
}
</style>
</head>

<body>

<a href="index.html" class="back">← Back</a>

<div class="wrapper" id="wrapper">
    
<sectionMain>
    <h1>Daniel Aniskin</h1>
    <imgMain src="Pmain">
</section>
    
<section>
    <h1>Project 1</h1>
    <img src="p1.png">
</section>

<section>
    <h1>Project 2</h1>
    <img src="https://picsum.photos/1400/900?2">
</section>

<section>
    <h1>Project 3</h1>
    <img src="https://picsum.photos/1400/900?3">
</section>

</div>

<!-- dots -->
<div class="dots" id="dots"></div>

<script>
const wrapper = document.getElementById("wrapper");
const sections = document.querySelectorAll("section");
const dotsContainer = document.getElementById("dots");

let index = 0;
let locked = false;

/* create dots */
sections.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "dot";
    if(i === 0) d.classList.add("active");
    d.onclick = () => goTo(i);
    dotsContainer.appendChild(d);
});

const dots = document.querySelectorAll(".dot");

function goTo(i){
    index = Math.max(0, Math.min(i, sections.length-1));
    wrapper.style.transform = `translateX(-${index * 100}vw)`;

    dots.forEach(d => d.classList.remove("active"));
    dots[index].classList.add("active");
}

/* wheel scroll = next/prev slide */
window.addEventListener("wheel", e => {
    if(locked) return;

    locked = true;

    if(e.deltaY > 0) index++;
    else index--;

    goTo(index);

    setTimeout(() => locked = false, 700); /* match transition time */
});

/* arrow keys */
window.addEventListener("keydown", e => {
    if(e.key === "ArrowRight") goTo(index+1);
    if(e.key === "ArrowLeft") goTo(index-1);
});
</script>

</body>
</html>
