<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CYGNUS X-1</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background:#04040a;
  overflow:hidden;
  font-family:'Share Tech Mono', monospace;
  cursor:none;
}

#cursor {
  position:fixed; width:5px; height:5px;
  background:#ff2d1a; border-radius:50%;
  pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%);
  box-shadow:0 0 10px #ff2d1a, 0 0 24px rgba(255,45,26,0.5);
}

/* ── CANVAS ── */
#c {
  position:fixed; inset:0;
  display:grid;
  grid-template-columns: repeat(18, 1fr);
  grid-template-rows: repeat(11, 1fr);
  gap:0;
}

/* Each cell */
.cell {
  position:relative;
  border:1px solid rgba(255,255,255,0.028);
  overflow:hidden;
}

/* ── SQUARE FILLS ── */
.fill-r  { background:#8b1a0e; }
.fill-rb { background:#b52010; }
.fill-g  { background:#0e4a22; }
.fill-gb { background:#1a6b34; }
.fill-b  { background:#0e1f4a; }
.fill-bb { background:#1a3580; }
.fill-v  { background:transparent; }

/* Glow on colored cells */
.fill-rb::after { content:''; position:absolute; inset:0; box-shadow:inset 0 0 30px rgba(255,60,20,0.3); }
.fill-gb::after { content:''; position:absolute; inset:0; box-shadow:inset 0 0 30px rgba(0,200,80,0.25); }
.fill-bb::after { content:''; position:absolute; inset:0; box-shadow:inset 0 0 30px rgba(30,100,255,0.3); }

/* Numbers inside cells */
.cell .n {
  position:absolute;
  font-family:'Share Tech Mono', monospace;
  line-height:1;
  user-select:none; pointer-events:none;
}
.n.r  { color:#ff4422; text-shadow:0 0 8px #ff2d1a; }
.n.g  { color:#00ff6a; text-shadow:0 0 8px #00cc55; }
.n.b  { color:#2a9fff; text-shadow:0 0 8px #1a7fff; }
.n.w  { color:rgba(255,255,255,0.35); }
.n.dw { color:rgba(255,255,255,0.10); }

/* Diagonal accent lines inside cells */
.cell.diag::before {
  content:'';
  position:absolute; inset:0;
  background: linear-gradient(
    var(--diag-angle, 135deg),
    transparent 48%,
    var(--diag-color, rgba(255,255,255,0.06)) 48%,
    var(--diag-color, rgba(255,255,255,0.06)) 52%,
    transparent 52%
  );
}

/* Scanlines */
#scan {
  position:fixed; inset:0; z-index:50; pointer-events:none;
  background: repeating-linear-gradient(
    to bottom,
    transparent, transparent 2px,
    rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
  );
}

/* Vignette */
#vig {
  position:fixed; inset:0; z-index:49; pointer-events:none;
  background: radial-gradient(ellipse at 50% 50%,
    transparent 45%,
    rgba(4,4,10,0.7) 80%,
    rgba(4,4,10,0.97) 100%
  );
}

/* Grain */
#grain {
  position:fixed; inset:-50%; width:200%; height:200%;
  z-index:51; pointer-events:none; opacity:0.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation:gr .15s steps(1) infinite;
}
@keyframes gr {
  0%  { transform:translate(0,0); }
  25% { transform:translate(-1%,-2%); }
  50% { transform:translate(2%,1%); }
  75% { transform:translate(-2%,2%); }
}

/* Subtle pulse on bright cells */
@keyframes dimPulse {
  0%,100% { opacity:1; }
  50%     { opacity:0.78; }
}
.pulse { animation: dimPulse 3.5s ease-in-out infinite; }
.pulse2 { animation: dimPulse 5s ease-in-out infinite; animation-delay:1.2s; }
.pulse3 { animation: dimPulse 4.2s ease-in-out infinite; animation-delay:2.8s; }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="scan"></div>
<div id="vig"></div>
<div id="grain"></div>

<div id="c"></div>

<script>
// ── GRID DATA ──
// 18 cols × 11 rows = 198 cells
// Each entry: [ fill-class, number-string, num-class, num-position, extra-classes ]
// fill: 'v'=void, 'r'=dark red, 'rb'=bright red, 'g'=dark green, 'gb'=bright green, 'b'=dark blue, 'bb'=bright blue
// num: '' = none
// pos: 'tl','tc','tr','cl','cc','cr','bl','bc','br' + size override

const R='rb', r='r', G='gb', g='g', B='bb', b='b', V='v';

// 18×11 layout — colour map (row by row)
const fills = [
  [V,V,r,V,B,b,V,V,r,V,V,b,V,R,V,V,g,V],
  [b,V,V,B,V,V,r,V,V,V,G,V,V,V,b,V,V,R],
  [V,R,V,V,V,g,V,b,V,r,V,V,G,V,V,B,V,V],
  [V,V,g,V,r,V,V,V,B,V,V,R,V,V,g,V,b,V],
  [G,V,V,b,V,V,r,V,V,g,V,V,V,B,V,r,V,V],
  [V,r,V,V,B,V,V,G,V,V,r,V,b,V,V,V,R,V],
  [V,V,b,V,V,g,V,V,V,B,V,r,V,V,G,V,V,b],
  [r,V,V,G,V,V,b,V,R,V,V,V,g,V,V,r,V,V],
  [V,B,V,V,r,V,V,b,V,V,G,V,V,R,V,V,g,V],
  [V,V,R,V,V,G,V,V,r,V,V,b,V,V,B,V,V,V],
  [g,V,V,b,V,V,B,V,V,r,V,V,g,V,V,R,V,b],
];

// Numbers scattered across the grid — [row, col, text, class, size, align]
// row/col are 0-indexed
const nums = [
  // LARGE feature numbers
  [0, 0,  '21',    'r',  '3.2rem', 'bl'], // solar masses
  [0, 16, '6',     'g',  '2.8rem', 'br'],
  [1, 4,  '1964',  'b',  '0.65rem','cc'],
  [1, 14, '∞',     'r',  '2.4rem', 'cc'],
  [2, 1,  '9',     'b',  '3rem',   'cc'],
  [2, 15, '0',     'g',  '3rem',   'cc'],
  [3, 2,  '5.6',   'g',  '0.6rem', 'cc'],
  [3, 11, '14.8',  'r',  '0.6rem', 'cc'],
  [4, 0,  '3',     'b',  '2.4rem', 'cc'],
  [4, 13, '7',     'r',  '2.8rem', 'cc'],
  [5, 1,  '0.04c', 'r',  '0.58rem','cc'],
  [5, 7,  '∞',     'g',  '2rem',   'cc'],
  [5, 16, '1',     'b',  '3.4rem', 'cc'],
  [6, 2,  '100M',  'b',  '0.55rem','cc'],
  [6, 9,  '8',     'r',  '2.6rem', 'cc'],
  [6, 14, '4',     'g',  '2.8rem', 'cc'],
  [7, 0,  '2.4e9', 'r',  '0.55rem','cc'],
  [7, 3,  '∞',     'b',  '2.2rem', 'cc'],
  [7, 8,  '21',    'g',  '0.65rem','cc'],
  [7, 15, '6055',  'b',  '0.58rem','cc'],
  [8, 1,  '5',     'g',  '2.4rem', 'cc'],
  [8, 4,  '1.86',  'r',  '0.55rem','cc'],
  [8, 10, '∞',     'r',  '1.8rem', 'cc'],
  [8, 13, '0',     'b',  '3rem',   'cc'],
  [9, 0,  '359',   'g',  '0.6rem', 'cc'],
  [9, 2,  '8',     'b',  '2rem',   'cc'],
  [9, 5,  '3',     'r',  '2.4rem', 'cc'],
  [9, 8,  '0.04',  'g',  '0.58rem','cc'],
  [9, 14, '∞',     'g',  '2rem',   'cc'],
  [10,0,  '7',     'r',  '2.8rem', 'cc'],
  [10,3,  '21M☉',  'dw', '0.52rem','cc'],
  [10,6,  '9',     'g',  '2.4rem', 'cc'],
  [10,9,  '1964',  'dw', '0.5rem', 'cc'],
  [10,12, '6',     'b',  '2.6rem', 'cc'],
  [10,15, '0',     'r',  '3rem',   'cc'],
  // Scattered small data
  [0, 3,  'X-1',   'dw', '0.5rem', 'cc'],
  [0, 8,  'CYG',   'dw', '0.5rem', 'cc'],
  [0, 11, '5kpc',  'dw', '0.5rem', 'cc'],
  [1, 10, 'BH',    'dw', '0.5rem', 'cc'],
  [2, 9,  '001',   'dw', '0.48rem','cc'],
  [3, 7,  '010',   'dw', '0.48rem','cc'],
  [4, 6,  '111',   'dw', '0.48rem','cc'],
  [5, 12, '100',   'dw', '0.48rem','cc'],
  [6, 5,  '011',   'dw', '0.48rem','cc'],
  [7, 11, '110',   'dw', '0.48rem','cc'],
  [8, 7,  '000',   'dw', '0.48rem','cc'],
  [9, 12, '001',   'dw', '0.48rem','cc'],
];

// Build grid
const grid = document.getElementById('c');
const COLS = 18, ROWS = 11;

// create cells
const cells = [];
for (let row = 0; row < ROWS; row++) {
  for (let col = 0; col < COLS; col++) {
    const cell = document.createElement('div');
    cell.className = 'cell fill-' + fills[row][col];
    cells.push({ el: cell, row, col });
    grid.appendChild(cell);
  }
}

// place numbers
const alignMap = {
  tl: ['4px auto auto 6px'],
  tc: ['4px auto auto 50%'],
  tr: ['4px 6px auto auto'],
  cl: ['50% auto auto 6px'],
  cc: ['50% auto auto 50%'],
  cr: ['50% 6px auto auto'],
  bl: ['auto auto 4px 6px'],
  bc: ['auto auto 4px 50%'],
  br: ['auto 6px 4px auto'],
};

nums.forEach(([row, col, text, cls, size, align]) => {
  const idx = row * COLS + col;
  const cell = cells[idx];
  if (!cell) return;
  const span = document.createElement('span');
  span.className = 'n ' + cls;
  span.textContent = text;
  span.style.fontSize = size;

  const [top, right, bottom, left] = (alignMap[align] || alignMap.cc);
  span.style.top    = top;
  span.style.right  = right;
  span.style.bottom = bottom;
  span.style.left   = left;
  if (align.includes('c')) {
    if (align === 'cc' || align === 'tc' || align === 'bc') {
      span.style.transform = 'translateX(-50%)';
    }
    if (align === 'cc' || align === 'cl' || align === 'cr') {
      span.style.transform = (span.style.transform ? 'translate(-50%,-50%)' : 'translateY(-50%)');
    }
    if (align === 'cc') span.style.transform = 'translate(-50%,-50%)';
  }

  cell.el.appendChild(span);
});

// Add pulse animation to some bright cells
const pulseClasses = ['pulse','pulse2','pulse3'];
document.querySelectorAll('.fill-rb, .fill-gb, .fill-bb').forEach((el, i) => {
  el.classList.add(pulseClasses[i % 3]);
});

// Cursor
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});
</script>
</body>
</html>
