<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CYGNUS X-1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --void: #00000a;
  --r: #c0392b;
  --g: #1a6b3a;
  --b: #1a3a6b;
  --r-bright: #ff2d1a;
  --g-bright: #00ff6a;
  --b-bright: #1a8fff;
  --dim: rgba(255,255,255,0.06);
  --num: rgba(255,255,255,0.18);
}

html, body {
  width: 100%; height: 100%;
  background: var(--void);
  overflow: hidden;
  font-family: 'Share Tech Mono', monospace;
  cursor: none;
}

/* ── CUSTOM CURSOR ── */
#cursor {
  position: fixed; width: 6px; height: 6px;
  background: var(--r-bright); border-radius: 50%;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width .1s, height .1s;
  box-shadow: 0 0 12px var(--r-bright), 0 0 30px rgba(255,45,26,0.4);
}

/* ── STAR FIELD ── */
#stars {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(1px 1px at 12% 8%, rgba(255,255,255,0.9) 0%, transparent 100%),
    radial-gradient(1px 1px at 87% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 34% 22%, rgba(255,255,255,0.85) 0%, transparent 100%),
    radial-gradient(1px 1px at 63% 5%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 91% 44%, rgba(255,255,255,0.8) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 7% 55%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 78% 67%, rgba(255,255,255,0.9) 0%, transparent 100%),
    radial-gradient(1px 1px at 23% 78%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 55% 88%, rgba(255,255,255,0.8) 0%, transparent 100%),
    radial-gradient(1px 1px at 96% 92%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 41% 96%, rgba(255,255,255,0.85) 0%, transparent 100%),
    radial-gradient(1px 1px at 3% 33%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(2px 2px at 50% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 18% 42%, rgba(200,220,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 73% 28%, rgba(255,200,200,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 29% 61%, rgba(200,255,220,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 84% 79%, rgba(255,255,255,0.75) 0%, transparent 100%),
    radial-gradient(1px 1px at 47% 14%, rgba(255,255,255,0.65) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 66% 52%, rgba(255,255,255,0.8) 0%, transparent 100%),
    radial-gradient(1px 1px at 11% 88%, rgba(255,255,255,0.55) 0%, transparent 100%);
  animation: starDrift 80s linear infinite;
}
@keyframes starDrift {
  from { transform: translateY(0); }
  to   { transform: translateY(-60px); }
}

/* ── ACCRETION DISK / BLACK HOLE ── */
#hole {
  position: fixed;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  z-index: 1;
  width: min(55vw, 55vh);
  height: min(55vw, 55vh);
}

/* Event horizon */
.event-horizon {
  position: absolute; inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 50%,
    #000 0%,
    #000 38%,
    rgba(0,0,0,0.98) 42%,
    transparent 60%
  );
  z-index: 10;
}

/* Glow rings around the singularity */
.glow-ring {
  position: absolute; border-radius: 50%;
  animation: pulse 4s ease-in-out infinite;
}
.glow-ring:nth-child(1) {
  inset: 30%; border: 1px solid rgba(255,120,20,0.6);
  box-shadow: 0 0 30px rgba(255,120,20,0.3), inset 0 0 30px rgba(255,120,20,0.1);
  animation-delay: 0s;
}
.glow-ring:nth-child(2) {
  inset: 22%; border: 1px solid rgba(255,60,10,0.35);
  box-shadow: 0 0 50px rgba(255,60,10,0.2);
  animation-delay: 1.2s;
}
.glow-ring:nth-child(3) {
  inset: 12%; border: 1px solid rgba(180,40,10,0.2);
  animation-delay: 2.4s;
}
@keyframes pulse {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50%       { opacity: 1;   transform: scale(1.015); }
}

/* Accretion disk — flat ellipse */
.disk {
  position: absolute; inset: 10%;
  border-radius: 50%;
  transform: rotateX(78deg) rotateZ(20deg);
  background: conic-gradient(
    from 0deg,
    rgba(255,200,80,0.0) 0%,
    rgba(255,150,40,0.7) 8%,
    rgba(255,80,20,0.9) 15%,
    rgba(200,40,10,0.6) 22%,
    rgba(100,20,5,0.2) 30%,
    rgba(0,0,0,0) 40%,
    rgba(0,0,0,0) 58%,
    rgba(60,10,2,0.2) 66%,
    rgba(180,60,15,0.7) 74%,
    rgba(255,130,40,0.85) 82%,
    rgba(255,200,80,0.5) 89%,
    rgba(255,200,80,0.0) 100%
  );
  animation: diskSpin 18s linear infinite;
  filter: blur(1px);
}
@keyframes diskSpin {
  from { transform: rotateX(78deg) rotateZ(20deg); }
  to   { transform: rotateX(78deg) rotateZ(380deg); }
}

/* Relativistic jet */
.jet {
  position: absolute; left: 50%; width: 2px;
  transform: translateX(-50%);
  border-radius: 2px;
  animation: jetFlicker 3s ease-in-out infinite;
}
.jet.top {
  bottom: 50%;
  height: 38%;
  background: linear-gradient(to top, rgba(26,143,255,0.8), transparent);
  box-shadow: 0 0 20px rgba(26,143,255,0.5), 0 0 60px rgba(26,143,255,0.2);
}
.jet.bottom {
  top: 50%;
  height: 38%;
  background: linear-gradient(to bottom, rgba(26,143,255,0.8), transparent);
  box-shadow: 0 0 20px rgba(26,143,255,0.5), 0 0 60px rgba(26,143,255,0.2);
}
@keyframes jetFlicker {
  0%,100% { opacity: 0.7; width: 2px; }
  50%     { opacity: 1;   width: 3px; }
}

/* ── GRAVITATIONAL LENSING HAZE ── */
.lens-haze {
  position: absolute; inset: -5%;
  border-radius: 50%;
  background: radial-gradient(ellipse at 50% 50%,
    transparent 34%,
    rgba(255,100,30,0.04) 40%,
    rgba(255,80,20,0.08) 46%,
    transparent 55%
  );
  animation: lensRotate 25s linear infinite;
}
@keyframes lensRotate {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* ── SQUARES ── */
.sq {
  position: fixed;
  z-index: 2;
  animation: sqFloat 6s ease-in-out infinite;
}
.sq::before {
  content: '';
  position: absolute; inset: 0;
}

/* RED squares */
.sq.r { background: var(--r); border: 1px solid var(--r-bright); }
.sq.r::after {
  content: '';
  position: absolute; inset: 0;
  box-shadow: 0 0 20px rgba(192,57,43,0.6), 0 0 60px rgba(192,57,43,0.2);
}

/* GREEN squares */
.sq.g { background: var(--g); border: 1px solid var(--g-bright); }
.sq.g::after {
  content: '';
  position: absolute; inset: 0;
  box-shadow: 0 0 20px rgba(26,107,58,0.6), 0 0 60px rgba(26,107,58,0.2);
}

/* BLUE squares */
.sq.b { background: var(--b); border: 1px solid var(--b-bright); }
.sq.b::after {
  content: '';
  position: absolute; inset: 0;
  box-shadow: 0 0 20px rgba(26,58,107,0.6), 0 0 60px rgba(26,58,107,0.2);
}

@keyframes sqFloat {
  0%,100% { transform: var(--rot) translateY(0px); }
  50%     { transform: var(--rot) translateY(-8px); }
}

/* Individual square positions & sizes & rotations */
/* TOP LEFT cluster */
.sq-1  { width:48px; height:48px; top:8vh;  left:5vw;  --rot:rotate(12deg);  animation-delay:0s;   }
.sq-2  { width:22px; height:22px; top:13vh; left:11vw; --rot:rotate(-25deg); animation-delay:.8s;  }
.sq-3  { width:70px; height:70px; top:18vh; left:3vw;  --rot:rotate(38deg);  animation-delay:1.5s; }
.sq-4  { width:14px; height:14px; top:6vh;  left:18vw; --rot:rotate(-7deg);  animation-delay:2.2s; }

/* TOP RIGHT cluster */
.sq-5  { width:55px; height:55px; top:5vh;  right:6vw;  --rot:rotate(-15deg); animation-delay:.4s;  }
.sq-6  { width:18px; height:18px; top:14vh; right:14vw; --rot:rotate(44deg);  animation-delay:1.1s; }
.sq-7  { width:80px; height:80px; top:20vh; right:3vw;  --rot:rotate(-30deg); animation-delay:2.0s; }
.sq-8  { width:12px; height:12px; top:9vh;  right:20vw; --rot:rotate(60deg);  animation-delay:.2s;  }

/* BOTTOM LEFT cluster */
.sq-9  { width:60px; height:60px; bottom:8vh;  left:4vw;  --rot:rotate(22deg);  animation-delay:1.8s; }
.sq-10 { width:20px; height:20px; bottom:15vh; left:12vw; --rot:rotate(-40deg); animation-delay:.6s;  }
.sq-11 { width:36px; height:36px; bottom:20vh; left:6vw;  --rot:rotate(55deg);  animation-delay:3.0s; }
.sq-12 { width:10px; height:10px; bottom:6vh;  left:20vw; --rot:rotate(-18deg); animation-delay:2.5s; }

/* BOTTOM RIGHT cluster */
.sq-13 { width:44px; height:44px; bottom:9vh;  right:5vw;  --rot:rotate(-35deg); animation-delay:.9s;  }
.sq-14 { width:16px; height:16px; bottom:16vh; right:13vw; --rot:rotate(28deg);  animation-delay:1.6s; }
.sq-15 { width:90px; height:90px; bottom:18vh; right:2vw;  --rot:rotate(12deg);  animation-delay:.3s;  }
.sq-16 { width:12px; height:12px; bottom:5vh;  right:22vw; --rot:rotate(-52deg); animation-delay:2.8s; }

/* SIDES — left mid */
.sq-17 { width:30px; height:30px; top:42vh; left:2vw;  --rot:rotate(47deg);  animation-delay:1.2s; }
.sq-18 { width:50px; height:50px; top:55vh; left:7vw;  --rot:rotate(-20deg); animation-delay:.5s;  }

/* SIDES — right mid */
.sq-19 { width:28px; height:28px; top:40vh; right:3vw;  --rot:rotate(-60deg); animation-delay:2.1s; }
.sq-20 { width:65px; height:65px; top:57vh; right:6vw;  --rot:rotate(18deg);  animation-delay:.7s;  }

/* ── NUMBERS ── */
.num {
  position: fixed;
  font-family: 'Share Tech Mono', monospace;
  letter-spacing: 0.08em;
  z-index: 3;
  animation: numPulse 5s ease-in-out infinite;
  user-select: none;
  pointer-events: none;
}
.num.r { color: var(--r-bright); text-shadow: 0 0 12px var(--r-bright), 0 0 30px rgba(255,45,26,0.4); }
.num.g { color: var(--g-bright); text-shadow: 0 0 12px var(--g-bright), 0 0 30px rgba(0,255,106,0.3); }
.num.b { color: var(--b-bright); text-shadow: 0 0 12px var(--b-bright), 0 0 30px rgba(26,143,255,0.4); }
.num.w { color: rgba(255,255,255,0.22); text-shadow: none; }

@keyframes numPulse {
  0%,100% { opacity: 0.7; }
  50%     { opacity: 1; }
}

/* ── SCANLINES OVERLAY ── */
#scanlines {
  position: fixed; inset: 0; z-index: 20;
  background: repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.04) 2px,
    rgba(0,0,0,0.04) 4px
  );
  pointer-events: none;
}

/* ── VIGNETTE ── */
#vignette {
  position: fixed; inset: 0; z-index: 4;
  background: radial-gradient(ellipse at 50% 50%,
    transparent 40%,
    rgba(0,0,8,0.6) 80%,
    rgba(0,0,8,0.95) 100%
  );
  pointer-events: none;
}

/* ── GRAIN ── */
#grain {
  position: fixed; inset: -50%; z-index: 21;
  width: 200%; height: 200%;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  animation: grainShift 0.12s steps(1) infinite;
  pointer-events: none;
}
@keyframes grainShift {
  0%   { transform: translate(0,0); }
  25%  { transform: translate(-2%,-1%); }
  50%  { transform: translate(1%,2%); }
  75%  { transform: translate(2%,-2%); }
  100% { transform: translate(-1%,1%); }
}

/* ── DATA LINES — top & bottom HUD strips ── */
.hud-line {
  position: fixed; left: 0; right: 0;
  height: 1px; background: rgba(255,255,255,0.06);
  z-index: 5;
}
.hud-line.top    { top: 48px; }
.hud-line.bottom { bottom: 48px; }

.hud-num {
  position: fixed;
  font-size: 0.6rem; letter-spacing: 0.3em;
  color: rgba(255,255,255,0.12);
  font-family: 'Share Tech Mono', monospace;
  z-index: 5; pointer-events: none;
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="stars"></div>
<div id="vignette"></div>
<div id="scanlines"></div>
<div id="grain"></div>

<!-- HUD lines -->
<div class="hud-line top"></div>
<div class="hud-line bottom"></div>

<!-- HUD corner numbers -->
<div class="hud-num" style="top:18px; left:24px;">19.231</div>
<div class="hud-num" style="top:18px; right:24px;">RA 19h 58m</div>
<div class="hud-num" style="bottom:18px; left:24px;">DEC +35°12′</div>
<div class="hud-num" style="bottom:18px; right:24px;">6055.LST</div>
<div class="hud-num" style="top:58px; left:24px; writing-mode:vertical-lr; letter-spacing:0.4em; opacity:0.5;">X-1</div>
<div class="hud-num" style="top:58px; right:24px; writing-mode:vertical-lr; letter-spacing:0.4em; opacity:0.5;">CYG</div>

<!-- BLACK HOLE -->
<div id="hole">
  <div class="lens-haze"></div>
  <div class="disk"></div>
  <div class="glow-ring"></div>
  <div class="glow-ring"></div>
  <div class="glow-ring"></div>
  <div class="jet top"></div>
  <div class="jet bottom"></div>
  <div class="event-horizon"></div>
</div>

<!-- RED squares -->
<div class="sq r sq-1"></div>
<div class="sq r sq-5"></div>
<div class="sq r sq-10"></div>
<div class="sq r sq-13"></div>
<div class="sq r sq-17"></div>
<div class="sq r sq-7"></div>

<!-- GREEN squares -->
<div class="sq g sq-2"></div>
<div class="sq g sq-6"></div>
<div class="sq g sq-9"></div>
<div class="sq g sq-14"></div>
<div class="sq g sq-19"></div>
<div class="sq g sq-11"></div>

<!-- BLUE squares -->
<div class="sq b sq-3"></div>
<div class="sq b sq-8"></div>
<div class="sq b sq-12"></div>
<div class="sq b sq-15"></div>
<div class="sq b sq-18"></div>
<div class="sq b sq-20"></div>

<!-- Small accent squares -->
<div class="sq r sq-4"></div>
<div class="sq g sq-16"></div>

<!-- NUMBERS — red -->
<div class="num r" style="top:9vh;  left:7vw;   font-size:clamp(0.55rem,1vw,0.8rem); animation-delay:0s;">14.8</div>
<div class="num r" style="top:24vh; left:16vw;  font-size:clamp(0.9rem,1.8vw,1.4rem);  animation-delay:1s; transform:rotate(-4deg);">8</div>
<div class="num r" style="bottom:12vh; left:9vw; font-size:clamp(0.55rem,0.9vw,0.75rem); animation-delay:.5s;">5.6×10⁶</div>
<div class="num r" style="bottom:22vh; right:16vw; font-size:clamp(1.2rem,2.5vw,2rem); animation-delay:2s; transform:rotate(6deg);">21</div>
<div class="num r" style="top:44vh; left:1.5vw; font-size:clamp(0.5rem,0.8vw,0.7rem); animation-delay:3s; transform:rotate(90deg) translateY(-8px);">1.86</div>

<!-- NUMBERS — green -->
<div class="num g" style="top:7vh;  right:8vw;  font-size:clamp(0.55rem,0.9vw,0.75rem); animation-delay:.3s;">0.04c</div>
<div class="num g" style="top:22vh; right:18vw; font-size:clamp(1rem,2vw,1.6rem); animation-delay:1.4s; transform:rotate(3deg);">3</div>
<div class="num g" style="bottom:10vh; right:7vw; font-size:clamp(0.6rem,1vw,0.8rem); animation-delay:.9s;">2.4e9</div>
<div class="num g" style="bottom:24vh; left:17vw; font-size:clamp(1.4rem,2.8vw,2.2rem); animation-delay:2.5s; transform:rotate(-8deg);">7</div>
<div class="num g" style="top:52vh;  right:2vw; font-size:clamp(0.5rem,0.8vw,0.65rem); animation-delay:1.8s; transform:rotate(-90deg);">359.2</div>

<!-- NUMBERS — blue -->
<div class="num b" style="top:16vh; left:2vw;  font-size:clamp(0.9rem,1.6vw,1.3rem); animation-delay:.7s; transform:rotate(-12deg);">6</div>
<div class="num b" style="top:11vh; right:4vw; font-size:clamp(0.55rem,0.9vw,0.75rem); animation-delay:2.2s;">100M</div>
<div class="num b" style="bottom:17vh; left:3vw; font-size:clamp(0.5rem,0.85vw,0.7rem); animation-delay:1.1s;">6055</div>
<div class="num b" style="bottom:8vh;  right:10vw; font-size:clamp(1.1rem,2.2vw,1.8rem); animation-delay:.4s; transform:rotate(10deg);">9</div>
<div class="num b" style="top:60vh; left:6vw; font-size:clamp(1.8rem,3.5vw,2.8rem); animation-delay:3.2s; transform:rotate(-5deg);">∞</div>

<!-- NUMBERS — dim white (data texture) -->
<div class="num w" style="top:31vh; left:9vw;  font-size:0.55rem; animation-delay:.2s; letter-spacing:0.5em;">1964</div>
<div class="num w" style="top:68vh; right:9vw; font-size:0.55rem; animation-delay:1.5s; letter-spacing:0.5em;">0001</div>
<div class="num w" style="bottom:28vh; left:24vw; font-size:0.5rem; animation-delay:2.8s;">M≈21M☉</div>
<div class="num w" style="top:28vh; right:6vw;  font-size:0.5rem; animation-delay:.6s;">5.6kpc</div>

<script>
// Cursor
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

// Subtle parallax on mouse move — hole drifts slightly
const hole = document.getElementById('hole');
document.addEventListener('mousemove', e => {
  const dx = (e.clientX / window.innerWidth  - 0.5) * 18;
  const dy = (e.clientY / window.innerHeight - 0.5) * 14;
  hole.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
});

// Squares subtle parallax — different depth layers
const sqs = document.querySelectorAll('.sq');
document.addEventListener('mousemove', e => {
  const dx = (e.clientX / window.innerWidth  - 0.5);
  const dy = (e.clientY / window.innerHeight - 0.5);
  sqs.forEach((sq, i) => {
    const depth = (i % 3 + 1) * 6;
    const baseRot = sq.style.getPropertyValue('--rot') || 'rotate(0deg)';
    sq.style.marginLeft = (dx * depth) + 'px';
    sq.style.marginTop  = (dy * depth) + 'px';
  });
});
</script>
</body>
</html>
